# vhost nginx para o Aeronav — arquivo NOVO em /etc/nginx/sites-available/aeronav
# (NÃO editar os vhosts existentes). Depois: symlink em sites-enabled, `nginx -t`, `systemctl reload nginx`.
#
# Use ESTE arquivo se o acesso externo chega direto ao nginx (porta 80/443).
# Se o acesso passa pelo Cloudflare Tunnel, NÃO precisa deste vhost — basta
# apontar o ingress do cloudflared para http://127.0.0.1:8050 (ver README-deploy.md).

server {
    listen 80;
    listen [::]:80;
    server_name aeronav.SEU-DOMINIO.com;   # <-- ajuste o (sub)domínio

    client_max_body_size 32m;              # uploads de IGC em lote

    location / {
        proxy_pass http://127.0.0.1:8050;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;           # geração de PDF pode demorar
    }
}

# HTTPS: rode `sudo certbot --nginx -d aeronav.SEU-DOMINIO.com` para adicionar
# automaticamente o bloco listen 443 + certificados Let's Encrypt.
